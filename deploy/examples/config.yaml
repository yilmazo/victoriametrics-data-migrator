# vm-migrator configuration example
# See README.md for full documentation of all options.

source:
  vmselect_url: "http://vmselect-source:8481/select/0/prometheus"
  # bearer_token: "your-token"
  # basic_auth:
  #   username: "user"
  #   password: "pass"
  # headers:
  #   X-Custom-Header: "value"
  # tls:
  #   insecure_skip_verify: false
  #   ca_file: "/path/to/ca.crt"
  #   cert_file: "/path/to/client.crt"
  #   key_file: "/path/to/client.key"

destination:
  vminsert_url: "http://vminsert-dest:8480/insert/0/prometheus"
  # bearer_token: "your-token"
  # basic_auth:
  #   username: "user"
  #   password: "pass"
  # tls:
  #   insecure_skip_verify: false

migration:
  filter_match: '{__name__=~".*"}'
  start_date: "2024-01-01"
  end_date: "2024-12-31"
  time_step: "day"         # day, hour, or month
  reverse_order: true      # newest first

# exclude_metrics:
#   - "unwanted_metric_.*"
#   - "another_pattern"

splitting:
  max_series_per_task: 100000
  safety_margin: 0.2
  max_regex_values: 100
  preferred_split_labels:
    - "instance"
    - "pod"
    - "namespace"
  exclude_split_labels:
    - "__name__"

workers:
  # Number of concurrent worker pods
  count: 5

  # Kubernetes namespace for worker pods
  namespace: "vm-migration"

  # gRPC port workers listen on
  grpc_port: 9091

  pod:
    # Image containing both vm-migrator and vmctl binaries
    image: "vm-migrator:latest"
    image_pull_policy: "IfNotPresent"
    # image_pull_secret: "my-registry-secret"

    # Path to vmctl binary inside the worker container
    vmctl_path: "/usr/local/bin/vmctl"

    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "2"
        memory: "2Gi"
    # node_selector:
    #   node-role: "worker"
    # tolerations:
    #   - key: "dedicated"
    #     operator: "Equal"
    #     value: "migration"
    #     effect: "NoSchedule"
    service_account: "vm-migrator-worker"

  vmctl:
    concurrency: 2
    rate_limit: 0              # bytes/sec, 0 = unlimited
    disable_binary_protocol: false
    disable_http_keep_alive: false
    backoff_retries: 10

retry:
  max_retries: 3
  auto_resplit: true
  resplit_factor: 0.5

logging:
  progress_interval: "30s"
  level: "info"
  report_file: "migration_report.json"

monitoring:
  enabled: true
  address: ":9090"

# Exclude these metrics entirely (regex patterns)
exclude_metrics:
  - "vm_.*"

# Per-metric overrides
# metric_overrides:
#   "http_request_duration_seconds_bucket":
#     max_series_per_task: 50000
#     preferred_split_labels: ["le", "instance"]
