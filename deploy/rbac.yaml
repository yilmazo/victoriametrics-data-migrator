---
# ServiceAccount for vm-migrator worker pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vm-migrator-worker
  namespace: vm-migration

---
# Role for the coordinator (whoever runs vm-migrator CLI)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vm-migrator-coordinator
  namespace: vm-migration
rules:
  # Manage worker Deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Read pod status for worker discovery
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Manage state ConfigMaps (optional, for state persistence)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "update", "delete"]

---
# RoleBinding — bind to your coordinator's service account or user
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vm-migrator-coordinator-binding
  namespace: vm-migration
subjects:
  # Option 1: Bind to a ServiceAccount (for in-cluster coordinator)
  - kind: ServiceAccount
    name: vm-migrator-coordinator
    namespace: vm-migration
  # Option 2: Bind to a user (for local/CI coordinator)
  # - kind: User
  #   name: your-user@example.com
  #   apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: vm-migrator-coordinator
  apiGroup: rbac.authorization.k8s.io

---
# ServiceAccount for the coordinator (if running in-cluster)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vm-migrator-coordinator
  namespace: vm-migration

---
# Namespace (optional — create if it doesn't exist)
apiVersion: v1
kind: Namespace
metadata:
  name: vm-migration
  labels:
    app: vm-migrator
