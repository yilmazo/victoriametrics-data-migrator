# E2E test configuration for vm-migrator
# This config is processed by run_e2e.sh which replaces date placeholders.

source:
  # Single-node VictoriaMetrics uses the same port for all APIs
  vmselect_url: "http://source-vm.e2e-source.svc.cluster.local:8428"

destination:
  vminsert_url: "http://dest-vm.e2e-dest.svc.cluster.local:8428"

migration:
  # Match only our e2e test metrics
  filter_match: '{__name__=~"e2e_.*"}'

  # These will be replaced at runtime by run_e2e.sh based on datagen output
  start_date: "REPLACE_START_DATE"
  end_date: "REPLACE_END_DATE"

  time_step: "day"
  reverse_order: true

splitting:
  # Source VM has search.maxExportSeries=5000.
  # e2e_requests_total has 10,000 series, so the first attempt will hit HTTP 422.
  # The splitter will then break it into sub-tasks ≤ 2000 series each.
  max_series_per_task: 2000

  safety_margin: 0.2
  max_regex_values: 100

  preferred_split_labels:
    - "instance"
    - "pod"

  exclude_split_labels:
    - "__name__"

workers:
  count: 3
  namespace: "vm-migration"
  grpc_port: 9091

  pod:
    # Same image as coordinator — single binary for both roles
    image: "localhost/vm-migrator-e2e:latest"
    image_pull_policy: "Never"
    vmctl_path: "/usr/local/bin/vmctl"
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    service_account: "vm-migrator-worker"

  vmctl:
    concurrency: 1
    rate_limit: 0
    disable_binary_protocol: false
    disable_http_keep_alive: false
    backoff_retries: 5

retry:
  max_retries: 2
  auto_resplit: true
  resplit_factor: 0.5

logging:
  progress_interval: "10s"
  level: "debug"
  report_file: "/tmp/migration_report.json"

monitoring:
  enabled: false
