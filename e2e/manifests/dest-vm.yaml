---
# Destination VictoriaMetrics single-node instance
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dest-vm
  namespace: e2e-dest
  labels:
    app: victoria-metrics
    role: dest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoria-metrics
      role: dest
  template:
    metadata:
      labels:
        app: victoria-metrics
        role: dest
    spec:
      containers:
        - name: victoria-metrics
          image: victoriametrics/victoria-metrics:v1.118.0
          args:
            - "--storageDataPath=/storage"
            - "--httpListenAddr=:8428"
            - "--retentionPeriod=12"
            - "--search.maxSeries=500000"
            - "--search.maxUniqueTimeseries=500000"
            - "--search.maxExportSeries=500000"
            # Enable dedup for migration safety
            - "--dedup.minScrapeInterval=1ms"
          ports:
            - containerPort: 8428
              name: http
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: storage
              mountPath: /storage
          readinessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: storage
          emptyDir:
            sizeLimit: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: dest-vm
  namespace: e2e-dest
  labels:
    app: victoria-metrics
    role: dest
spec:
  type: NodePort
  selector:
    app: victoria-metrics
    role: dest
  ports:
    - port: 8428
      targetPort: 8428
      nodePort: 30429
      name: http
