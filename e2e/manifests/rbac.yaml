---
# RBAC for vm-migrator e2e test
# The coordinator (running as a Job in vm-migration namespace)
# needs to create/watch/delete the worker Deployment and discover pods.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: vm-migrator-coordinator
  namespace: vm-migration
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vm-migrator-worker
  namespace: vm-migration
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vm-migrator-coordinator
  namespace: vm-migration
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vm-migrator-coordinator-binding
  namespace: vm-migration
subjects:
  - kind: ServiceAccount
    name: vm-migrator-coordinator
    namespace: vm-migration
roleRef:
  kind: Role
  name: vm-migrator-coordinator
  apiGroup: rbac.authorization.k8s.io
